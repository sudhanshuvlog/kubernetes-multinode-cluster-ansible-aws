- name: Setup Kubernetes With Common Configurations
  hosts: all
  become: true

  vars:
    kubernetes_version: "v1.30"
    pod_cidr: "192.168.0.0/16"
    packages:
      - iproute-tc
      - git
      - curl

  tasks:
    - name: Disable swap
      command: swapoff -a

    - name: Add swapoff to crontab for reboot
      cron:
        name: "Ensure swapoff -a runs at reboot"
        job: "/sbin/swapoff -a"
        special_time: "reboot"
        state: present

    - name: Install required packages
      dnf:
        name: "{{ packages }}"
        state: present
      when: True

    - name: Load kernel modules
      modprobe:
        name: "{{ item }}"
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Apply sysctl params
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Reload sysctl
      command: sysctl --system

    - name: Disable SELinux
      command: setenforce 0
      ignore_errors: true

    - name: Add Kubernetes repo
      copy:
        dest: /etc/yum.repos.d/kubernetes.repo
        content: |
          [kubernetes]
          name=Kubernetes
          baseurl=https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/rpm/repodata/repomd.xml.key

    - name: Install CRI-O repo
      shell: |
        curl -L https://pkgs.k8s.io/addons:/cri-o:/stable:/{{ kubernetes_version }}/rpm/repodata/repomd.xml.key | tee /etc/pki/rpm-gpg/RPM-GPG-KEY-crio
        cat <<EOF >/etc/yum.repos.d/crio.repo
        [cri-o]
        name=CRI-O
        baseurl=https://pkgs.k8s.io/addons:/cri-o:/stable:/{{ kubernetes_version }}/rpm/
        enabled=1
        gpgcheck=1
        gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-crio
        EOF

    - name: Install Kubernetes & CRI-O
      dnf:
        name:
          - cri-o
          - kubelet
          - kubeadm
          - kubectl
        state: present

    - name: Enable services
      systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - crio
        - kubelet
